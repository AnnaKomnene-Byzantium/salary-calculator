<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三人工资计算器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, "SF Pro SC", "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    padding: 48px 24px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .container {
    max-width: 1080px;
    margin: 0 auto;
  }

  /* ---- Header ---- */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.003em;
    color: #1d1d1f;
    margin-bottom: 6px;
  }
  .header p {
    font-size: 16px;
    font-weight: 400;
    color: #6e6e73;
    letter-spacing: 0.01em;
  }

  /* ---- Section (replaces .card) ---- */
  .section {
    background: #fff;
    border-radius: 18px;
    padding: 36px 40px;
    margin-bottom: 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04), 0 0 1px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.06);
  }
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #6e6e73;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid #e8e8ed;
  }

  /* ---- Grid layout ---- */
  .grid {
    display: grid;
    grid-template-columns: 90px 1fr 1fr 1fr;
    gap: 6px 20px;
    align-items: center;
  }

  .grid .col-header {
    font-size: 12px;
    font-weight: 600;
    color: #6e6e73;
    text-align: center;
    padding: 6px 4px 10px;
    letter-spacing: 0.03em;
  }
  .grid .col-header:first-child { text-align: left; }

  .grid .row-label {
    font-size: 13px;
    color: #6e6e73;
    font-weight: 500;
    padding: 4px 0;
  }
  .grid .row-label .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    padding: 2px 10px;
    border-radius: 30px;
    letter-spacing: 0.03em;
    margin-bottom: 3px;
  }
  .grid .row-label .badge-mgr {
    background: #f5f5f7;
    color: #1d1d1f;
    border: 1px solid #e8e8ed;
  }
  .grid .row-label .badge-staff {
    color: #6e6e73;
    font-weight: 400;
  }

  .grid .cell {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .grid .cell .mobile-label {
    display: none;
  }

  .grid input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e8e8ed;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
    outline: none;
    background: #fff;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    color: #1d1d1f;
  }
  .grid input[type="number"] {
    font-family: "Times New Roman", Times, Georgia, serif;
  }
  .grid input:focus {
    border-color: #0071e3;
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .grid input::placeholder {
    color: #c7c7cc;
    font-weight: 400;
  }

  .grid .name-input {
    font-family: -apple-system, "SF Pro SC", "PingFang SC", sans-serif;
    font-weight: 500;
  }

  .grid .col-mgr {
    background: #fafafa;
    border-radius: 10px;
    padding: 4px 10px;
    margin: -4px -10px;
  }

  /* ---- 店长绩效 input ---- */
  .global-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .global-row label {
    font-size: 14px;
    font-weight: 500;
    color: #1d1d1f;
    white-space: nowrap;
  }
  .global-row input {
    width: 260px;
    padding: 10px 14px;
    border: 1.5px solid #e8e8ed;
    border-radius: 10px;
    font-size: 16px;
    font-family: "Times New Roman", Times, Georgia, serif;
    font-weight: 500;
    outline: none;
    background: #fff;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
    color: #1d1d1f;
  }
  .global-row input:focus {
    border-color: #0071e3;
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }

  /* ---- Button ---- */
  .calc-btn {
    display: block;
    width: 100%;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #0071e3;
    color: #fff;
    letter-spacing: 0.02em;
    transition: all 0.25s ease;
    margin-bottom: 20px;
  }
  .calc-btn:hover {
    background: #0077ed;
    box-shadow: 0 4px 16px rgba(0,113,227,0.3);
    transform: translateY(-1px);
  }
  .calc-btn:active {
    background: #0064ce;
    transform: translateY(0);
  }

  /* ---- Results ---- */
  .result-section { display: none; }
  .result-section.show { display: block; }

  .result-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 20px;
  }

  .result-card {
    background: #fafafa;
    border-radius: 14px;
    padding: 24px;
    border: 1px solid #e8e8ed;
    transition: transform 0.2s ease;
  }
  .result-card.mgr {
    background: #fff;
    border-color: #0071e3;
    box-shadow: 0 2px 8px rgba(0,113,227,0.08);
  }

  .result-name {
    font-size: 18px;
    font-weight: 700;
    color: #1d1d1f;
    margin-bottom: 2px;
  }
  .result-sub {
    font-size: 12px;
    color: #6e6e73;
    margin-bottom: 16px;
  }
  .result-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 7px 0;
    font-size: 14px;
  }
  .result-item + .result-item {
    border-top: 1px solid #f0f0f0;
  }
  .result-item .lbl {
    color: #6e6e73;
    font-weight: 400;
  }
  .result-item .amt {
    font-weight: 600;
    font-family: "Times New Roman", Times, Georgia, serif;
    font-size: 14px;
    color: #1d1d1f;
  }
  .result-item .amt.green { color: #30b94e; }
  .result-item .amt.red { color: #ff3b30; }

  .result-mgr-label {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    color: #0071e3;
    background: rgba(0,113,227,0.08);
    padding: 2px 8px;
    border-radius: 30px;
    letter-spacing: 0.02em;
    margin-bottom: 12px;
  }

  .result-total {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0 0;
    margin-top: 8px;
    border-top: 2px solid #e8e8ed;
    font-size: 16px;
    font-weight: 700;
  }
  .result-total .amt {
    font-family: "Times New Roman", Times, Georgia, serif;
    font-size: 18px;
  }

  .result-settle {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0 0;
    margin-top: 6px;
    border-top: 1px dashed #e8e8ed;
    font-size: 14px;
    font-weight: 600;
    font-family: "Times New Roman", Times, Georgia, serif;
  }
  .result-settle .give { color: #ff3b30; }
  .result-settle .take { color: #30b94e; }

  .avg-box {
    background: #fff;
    border: 1px solid #e8e8ed;
    border-radius: 14px;
    padding: 24px;
    text-align: center;
  }
  .avg-box .lbl {
    font-size: 13px;
    font-weight: 500;
    color: #6e6e73;
    margin-bottom: 4px;
  }
  .avg-box .num {
    font-size: 40px;
    font-weight: 700;
    color: #1d1d1f;
    font-family: "Times New Roman", Times, Georgia, serif;
    letter-spacing: -0.02em;
  }

  /* ---- Responsive ---- */
  @media (max-width: 820px) {
    body { padding: 20px 16px; }
    .section { padding: 20px; }
    .header h1 { font-size: 26px; }
    .grid { grid-template-columns: 1fr; gap: 4px; }
    .grid .col-header { display: none; }
    .grid .cell .mobile-label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #8e8e93;
      letter-spacing: 0.02em;
    }
    .grid .row-label {
      font-size: 15px;
      font-weight: 600;
      color: #1d1d1f;
      padding: 14px 0 2px;
      border-top: 1px solid #f0f0f0;
      margin-top: 4px;
    }
    .grid .row-label .badge { display: none; }
    .grid .col-mgr { padding: 4px 6px; margin: 0 -2px; }
    .result-grid { grid-template-columns: 1fr; }
    .global-row { flex-direction: column; align-items: stretch; }
    .global-row input { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>工资计算器</h1>
    <p>三人绩效分配 · 多退少补</p>
  </div>

  <div class="section">
    <div class="section-title">人员信息</div>
    <div class="grid" id="personGrid"></div>
  </div>

  <div class="section">
    <div class="section-title">公共项目</div>
    <div class="global-row">
      <label for="managerBonus">店长绩效（元）</label>
      <input type="number" id="managerBonus" value="0" min="0" step="0.01" placeholder="0.00">
    </div>
  </div>

  <button class="calc-btn" onclick="calculate()">计算工资</button>

  <div class="section result-section" id="resultSection">
    <div class="section-title">计算结果</div>
    <div class="result-grid" id="resultGrid"></div>
  </div>

</div>

<script>
const persons = [
  { id: 0, role: 'manager', label: '店长', defaultName: '店长' },
  { id: 1, role: 'staff',  label: '店员A', defaultName: '店员A' },
  { id: 2, role: 'staff',  label: '店员B', defaultName: '店员B' },
];
const fields = [
  { key: 'name',   label: '姓名',          cls: 'p-name name-input',  type: 'text',   ph: '' },
  { key: 'base',   label: '基本工资（元）', cls: 'p-base',            type: 'number', ph: '0.00', step: '0.01', min: '0' },
  { key: 'days',   label: '出勤天数',       cls: 'p-days',            type: 'number', ph: '0',   step: '0.5',  min: '0' },
  { key: 'perf',   label: '绩效基数（元）', cls: 'p-perf',            type: 'number', ph: '0.00', step: '0.01', min: '0' },
  { key: 'reward', label: '奖惩（元）',     cls: 'p-reward',          type: 'number', ph: '0.00', step: '0.01' },
];

function build() {
  const g = document.getElementById('personGrid');
  let h = '<div class="col-header"></div>';
  persons.forEach(p => {
    const badge = p.role === 'manager'
      ? '<span class="badge badge-mgr">店长</span>'
      : '<span class="badge badge-staff">' + p.label + '</span>';
    h += '<div class="col-header">' + badge + '</div>';
  });

  fields.forEach(f => {
    h += '<div class="row-label">' + f.label + '</div>';
    persons.forEach((p, i) => {
      const isMgr = p.role === 'manager';
      const attrs = f.key === 'name'
        ? 'value="' + p.defaultName + '"'
        : 'placeholder="' + f.ph + '" step="' + (f.step || 'any') + '"' + (f.min !== undefined ? ' min="' + f.min + '"' : '');
      h += '<div class="cell' + (isMgr ? ' col-mgr' : '') + '">'
         + '<span class="mobile-label">' + f.label + '</span>'
         + '<input type="' + f.type + '" class="' + f.cls + '" ' + attrs + '>'
         + '</div>';
    });
  });

  g.innerHTML = h;

  // Auto-fit: scale font-size so number inputs always fit
  const numInputs = g.querySelectorAll('input[type="number"]');
  numInputs.forEach(function(inp) {
    inp.addEventListener('input', autoFitInput);
  });
  document.getElementById('managerBonus').addEventListener('input', autoFitInput);

  // Run auto-fit on initial values
  numInputs.forEach(function(inp) { autoFitInput.call(inp); });
  autoFitInput.call(document.getElementById('managerBonus'));
}

function autoFitInput() {
  var el = this;
  var maxSize = 16;
  var minSize = 10;
  el.style.fontSize = maxSize + 'px';
  while (el.scrollWidth > el.clientWidth && parseInt(el.style.fontSize) > minSize) {
    el.style.fontSize = (parseInt(el.style.fontSize) - 1) + 'px';
  }
}

function v(sel, i) {
  const el = document.querySelectorAll(sel.split(' ')[0])[i];
  return el ? (parseFloat(el.value) || 0) : 0;
}
function t(sel, i) {
  const el = document.querySelectorAll(sel.split(' ')[0])[i];
  return el ? el.value : '';
}

function calculate() {
  const nm    = persons.map((_, i) => t('.p-name', i));
  const base   = persons.map((_, i) => v('.p-base', i));
  const days   = persons.map((_, i) => v('.p-days', i));
  const perf   = persons.map((_, i) => v('.p-perf', i));
  const reward = persons.map((_, i) => v('.p-reward', i));
  const mgrB   = v('#managerBonus', 0);

  const td = days.reduce((a, b) => a + b, 0);
  const tp = perf.reduce((a, b) => a + b, 0);
  const tr = reward.reduce((a, b) => a + b, 0);

  const res = persons.map((p, i) => {
    const pa = td > 0 ? (days[i] / td) * tp : 0;
    const ra = tr / 3;
    const hf = mgrB * 0.5, each = hf / 3;
    const ma = p.role === 'manager' ? each + hf : each;
    const total = base[i] + pa + ra + ma;
    return { name: nm[i], label: p.label, isMgr: p.role === 'manager',
      base: base[i], pa, ra, ma, total, days: days[i], pb: perf[i], rw: reward[i] };
  });

  // 实际所得 = 绩效基数 + 奖惩
  const actuals = res.map(r => r.pb + r.rw);
  const avgActual = actuals.reduce((s, v) => s + v, 0) / 3;

  document.getElementById('resultSection').classList.add('show');
  const grid = document.getElementById('resultGrid');
  grid.innerHTML = '';
  res.forEach(r => {
    const actual = r.pb + r.rw;
    const d = actual - avgActual;
    const c = document.createElement('div');
    c.className = 'result-card' + (r.isMgr ? ' mgr' : '');
    c.innerHTML =
      (r.isMgr ? '<div class="result-mgr-label">店 长</div>' : '') +
      '<div class="result-name">' + r.name + '</div>' +
      '<div class="result-sub">出勤 ' + r.days + '天 · 绩效基数 ' + r.pb.toFixed(2) + '元 · 奖惩 ' + (r.rw >= 0 ? '+' : '') + r.rw.toFixed(2) + '元</div>' +
      '<div class="result-item"><span class="lbl">基本工资</span><span class="amt">' + r.base.toFixed(2) + '</span></div>' +
      '<div class="result-item"><span class="lbl">绩效分配</span><span class="amt green">+' + r.pa.toFixed(2) + '</span></div>' +
      '<div class="result-item"><span class="lbl">奖惩（均分）</span><span class="amt ' + (r.ra >= 0 ? 'green' : 'red') + '">' + (r.ra >= 0 ? '+' : '') + r.ra.toFixed(2) + '</span></div>' +
      '<div class="result-item"><span class="lbl">店长绩效</span><span class="amt green">+' + r.ma.toFixed(2) + '</span></div>' +
      '<div class="result-total"><span class="lbl">合 计</span><span class="amt">' + r.total.toFixed(2) + '</span></div>' +
      '<div class="result-settle"><span class="' + (d >= 0 ? 'take' : 'give') + '">实际所得 ' + (d >= 0 ? '高于均值' : '低于均值') + '</span><span class="' + (d >= 0 ? 'take' : 'give') + '">' + (d >= 0 ? '+' : '') + d.toFixed(2) + '</span></div>';
    grid.appendChild(c);
  });
}

build();
</script>
</body>
</html>
